<!DOCTYPE html>
<html lang="en" data-aesthetic="utility" data-density="balanced">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- index.html MUST NOT be cached long-term — it's the only file in the
       bundle whose name doesn't carry a content hash, and stale HTML means a
       browser keeps importing the previous build's hashed JS/CSS files which
       no longer exist on the CDN. GH Pages ignores Cache-Control headers on
       static files, so these meta tags + the PWA service worker's autoUpdate
       registration are our belt-and-suspenders. Hashed JS/CSS assets under
       /assets/ stay immutable and cacheable forever (Vite hashes them per build). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Ward Manager</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23205fbf'/%3E%3Ctext x='50' y='68' font-family='system-ui,sans-serif' font-size='62' font-weight='600' text-anchor='middle' fill='white'%3EW%3C/text%3E%3C/svg%3E" />
  <script type="module" crossorigin src="/ward-crm-spa/assets/index-6ibbA79K.js"></script>
  <link rel="stylesheet" crossorigin href="/ward-crm-spa/assets/index-fqrYjpzA.css">
<link rel="manifest" href="/ward-crm-spa/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/ward-crm-spa/registerSW.js"></script></head>
<body>
  <div id="root">
    <div id="boot-screen" role="status" aria-live="polite">
      <div class="boot-spinner"></div>
      <div class="boot-text">Loading ward data…</div>
    </div>
  </div>
  <style>
    #boot-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; background: #faf9f5; color: #555;
      font-family: system-ui, -apple-system, sans-serif; font-size: 14px;
      transition: opacity 200ms ease-out; z-index: 9998;
    }
    #boot-screen.hide { opacity: 0; pointer-events: none; }
    .boot-spinner {
      width: 28px; height: 28px; border: 3px solid #e8e6dc; border-top-color: #205fbf;
      border-radius: 50%; animation: boot-spin 0.8s linear infinite;
    }
    @keyframes boot-spin { to { transform: rotate(360deg); } }
  </style>
</body>
</html>
